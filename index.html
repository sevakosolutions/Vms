<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sevako VMS · Vendor Management</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --forest:#10312B;
    --forest-2:#1D4E42;
    --forest-3:#295E50;
    --gold:#C9A227;
    --gold-light:#E4C766;
    --cream:#F7F5EF;
    --paper:#FFFFFF;
    --ink:#1A1D1B;
    --slate:#5B6660;
    --slate-light:#8B958F;
    --line:#E4E1D6;
    --red:#B3412C;
    --red-bg:#FBEAE6;
    --amber:#A9761C;
    --amber-bg:#FBF1DD;
    --green:#2F6B4F;
    --green-bg:#E6F0EA;
    --blue:#2C5A82;
    --blue-bg:#E7EFF5;
    --gray-bg:#EFEEE8;
    --radius:10px;
    --shadow: 0 1px 2px rgba(16,49,43,.06), 0 4px 16px rgba(16,49,43,.05);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'IBM Plex Sans', sans-serif;
    background:var(--cream);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.brand,.stamp{font-family:'Syne',sans-serif;}
  .mono{font-family:'IBM Plex Mono', monospace;}
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  ::selection{background:var(--gold-light); color:var(--forest);}

  /* ---------- LOGIN ---------- */
  #login-view{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 15% 20%, rgba(201,162,39,0.10), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(41,94,80,0.35), transparent 45%),
      var(--forest);
  }
  .login-card{
    width:400px; max-width:92vw; background:var(--paper); border-radius:14px;
    padding:40px 36px 32px; box-shadow:0 20px 60px rgba(0,0,0,.35);
  }
  .login-brand{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
  .login-brand .mark{
    width:34px; height:34px; border-radius:8px; background:var(--forest);
    display:flex; align-items:center; justify-content:center;
    color:var(--gold-light); font-family:'Syne'; font-weight:800; font-size:16px;
  }
  .login-brand .name{font-size:19px; font-weight:800; color:var(--forest); letter-spacing:.2px;}
  .login-sub{color:var(--slate); font-size:13px; margin-bottom:28px;}
  .field{margin-bottom:16px;}
  .field label{display:block; font-size:12px; font-weight:600; color:var(--slate); margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px;}
  .field input{
    width:100%; padding:11px 13px; border:1.5px solid var(--line); border-radius:8px;
    font-size:14px; outline:none; transition:border-color .15s;
  }
  .field input:focus{border-color:var(--forest-3);}
  .btn-primary{
    width:100%; padding:12px; background:var(--forest); color:#fff; border:none;
    border-radius:8px; font-weight:600; font-size:14px; margin-top:6px;
    transition:background .15s;
  }
  .btn-primary:hover{background:var(--forest-2);}
  .login-error{color:var(--red); font-size:13px; margin-top:10px; display:none;}
  .login-foot{text-align:center; font-size:11.5px; color:var(--slate-light); margin-top:22px;}

  /* ---------- APP SHELL ---------- */
  #app-view{display:none; min-height:100vh;}
  .shell{display:grid; grid-template-columns:230px 1fr; min-height:100vh;}
  .sidebar{
    background:var(--forest); color:#EDEDE6; padding:22px 16px; display:flex; flex-direction:column;
    position:sticky; top:0; height:100vh;
  }
  .sb-brand{display:flex; align-items:center; gap:9px; padding:4px 8px 22px;}
  .sb-brand .mark{
    width:30px; height:30px; border-radius:7px; background:var(--gold);
    display:flex; align-items:center; justify-content:center; color:var(--forest);
    font-family:'Syne'; font-weight:800; font-size:14px;
  }
  .sb-brand .name{font-family:'Syne'; font-weight:700; font-size:16px; color:#fff;}
  .sb-nav{display:flex; flex-direction:column; gap:2px; flex:1;}
  .sb-nav button{
    display:flex; align-items:center; gap:10px; text-align:left; background:none; border:none;
    color:#C6D2CB; padding:10px 12px; border-radius:8px; font-size:13.5px; font-weight:500;
    transition:background .12s, color .12s;
  }
  .sb-nav button:hover{background:rgba(255,255,255,.06); color:#fff;}
  .sb-nav button.active{background:var(--gold); color:var(--forest); font-weight:700;}
  .sb-nav .icon{width:18px; text-align:center; font-size:14px;}
  .sb-foot{border-top:1px solid rgba(255,255,255,.12); padding-top:14px; margin-top:10px;}
  .sb-user{font-size:12.5px; color:#C6D2CB; margin-bottom:8px; line-height:1.4;}
  .sb-user b{color:#fff; display:block; font-size:13px;}
  .sb-role{
    display:inline-block; font-size:10px; text-transform:uppercase; letter-spacing:.5px;
    background:rgba(255,255,255,.1); padding:2px 7px; border-radius:4px; margin-top:3px;
  }
  .sb-logout{
    width:100%; background:none; border:1px solid rgba(255,255,255,.2); color:#EDEDE6;
    padding:8px; border-radius:7px; font-size:12.5px;
  }
  .sb-logout:hover{background:rgba(255,255,255,.08);}

  .main{padding:28px 34px 60px; overflow-x:hidden;}
  .topbar{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px; flex-wrap:wrap; gap:12px;}
  .topbar h1{font-size:22px; color:var(--forest); font-weight:700;}
  .topbar .sub{color:var(--slate); font-size:13px; margin-top:3px;}
  .btn{
    padding:9px 16px; border-radius:8px; border:1.5px solid var(--line); background:#fff;
    font-size:13px; font-weight:600; color:var(--ink); display:inline-flex; align-items:center; gap:6px;
  }
  .btn:hover{border-color:var(--forest-3);}
  .btn-gold{background:var(--gold); border-color:var(--gold); color:var(--forest);}
  .btn-gold:hover{background:var(--gold-light); border-color:var(--gold-light);}
  .btn-ghost{border:none; background:none; color:var(--slate); font-size:12.5px; font-weight:500;}
  .btn-danger{color:var(--red); border-color:#EBD3CC;}

  /* KPI cards */
  .kpi-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:14px; margin-bottom:26px;}
  .kpi{background:var(--paper); border-radius:var(--radius); padding:16px 18px; box-shadow:var(--shadow); border-left:3px solid var(--gold);}
  .kpi .label{font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--slate); font-weight:600;}
  .kpi .value{font-family:'Syne'; font-size:26px; font-weight:800; color:var(--forest); margin-top:6px;}
  .kpi .sub{font-size:11.5px; color:var(--slate-light); margin-top:3px;}

  /* Cards / panels */
  .panel{background:var(--paper); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px 22px; margin-bottom:20px;}
  .panel-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .panel-head h3{font-size:15px; color:var(--forest); font-weight:700;}

  /* Table */
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--slate); padding:9px 12px; border-bottom:1.5px solid var(--line); font-weight:600;}
  td{padding:11px 12px; border-bottom:1px solid var(--line); color:var(--ink); vertical-align:middle;}
  tr:hover td{background:#FAF9F5;}
  tr:last-child td{border-bottom:none;}
  .row-click{cursor:pointer;}
  .amt{font-family:'IBM Plex Mono'; font-weight:600;}
  .num{text-align:right;}

  .badge{display:inline-block; padding:3px 9px; border-radius:20px; font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.3px;}
  .badge-draft{background:var(--gray-bg); color:var(--slate);}
  .badge-pending_approval{background:var(--amber-bg); color:var(--amber);}
  .badge-approved{background:var(--green-bg); color:var(--green);}
  .badge-rejected{background:var(--red-bg); color:var(--red);}
  .badge-ordered{background:var(--blue-bg); color:var(--blue);}
  .badge-partially_received{background:var(--amber-bg); color:var(--amber);}
  .badge-received{background:var(--green-bg); color:var(--green);}
  .badge-closed{background:var(--gray-bg); color:var(--slate);}
  .badge-cancelled{background:var(--red-bg); color:var(--red);}
  .badge-active{background:var(--green-bg); color:var(--green);}
  .badge-inactive{background:var(--gray-bg); color:var(--slate);}
  .badge-blacklisted{background:var(--red-bg); color:var(--red);}

  .toolbar{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; align-items:center;}
  .toolbar input[type=text], .toolbar select{
    padding:9px 12px; border:1.5px solid var(--line); border-radius:8px; font-size:13px; background:#fff;
  }
  .toolbar input[type=text]{min-width:220px;}
  .empty{text-align:center; padding:50px 20px; color:var(--slate-light);}
  .empty .big{font-size:32px; margin-bottom:8px;}

  /* Modal */
  .overlay{
    display:none; position:fixed; inset:0; background:rgba(16,49,43,.45); z-index:50;
    align-items:flex-start; justify-content:center; padding:40px 16px; overflow-y:auto;
  }
  .overlay.open{display:flex;}
  .modal{background:#fff; border-radius:14px; width:640px; max-width:100%; box-shadow:0 30px 70px rgba(0,0,0,.3);}
  .modal.wide{width:840px;}
  .modal-head{display:flex; justify-content:space-between; align-items:center; padding:20px 24px; border-bottom:1px solid var(--line);}
  .modal-head h3{font-size:16px; color:var(--forest); font-family:'Syne'; font-weight:700;}
  .modal-close{background:none; border:none; font-size:20px; color:var(--slate); line-height:1;}
  .modal-body{padding:22px 24px; max-height:70vh; overflow-y:auto;}
  .modal-foot{padding:16px 24px; border-top:1px solid var(--line); display:flex; justify-content:flex-end; gap:10px;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .field-sm label{display:block; font-size:11.5px; font-weight:600; color:var(--slate); margin-bottom:5px;}
  .field-sm input, .field-sm select, .field-sm textarea{
    width:100%; padding:9px 11px; border:1.5px solid var(--line); border-radius:7px; font-size:13.5px; outline:none;
  }
  .field-sm input:focus, .field-sm select:focus, .field-sm textarea:focus{border-color:var(--forest-3);}
  .field-sm{margin-bottom:13px;}

  /* PO items builder */
  .items-table th, .items-table td{padding:8px 8px;}
  .items-table input{width:100%; padding:7px 8px; border:1.5px solid var(--line); border-radius:6px; font-size:13px;}
  .add-item-btn{margin-top:8px; font-size:12.5px;}
  .totals-box{margin-top:14px; margin-left:auto; width:260px; font-size:13.5px;}
  .totals-box .r{display:flex; justify-content:space-between; padding:5px 0;}
  .totals-box .r.grand{border-top:1.5px solid var(--line); margin-top:6px; padding-top:10px; font-weight:700; font-size:15px; color:var(--forest);}

  /* PO document view */
  .po-doc{border:1.5px solid var(--line); border-radius:10px; overflow:hidden;}
  .po-doc-head{background:var(--forest); color:#fff; padding:22px 26px; display:flex; justify-content:space-between; align-items:flex-start;}
  .po-doc-head .po-num{font-family:'Syne'; font-size:20px; font-weight:800; letter-spacing:.3px;}
  .po-doc-head .po-meta{font-size:12px; color:#C6D2CB; margin-top:4px;}
  .stamp{
    font-family:'Syne'; font-weight:800; font-size:13px; letter-spacing:1.5px; text-transform:uppercase;
    border:2px solid; border-radius:6px; padding:5px 12px; transform:rotate(4deg); display:inline-block;
  }
  .stamp.approved{color:#8FD9AE; border-color:#8FD9AE;}
  .stamp.rejected{color:#F0A38F; border-color:#F0A38F;}
  .stamp.pending_approval{color:var(--gold-light); border-color:var(--gold-light);}
  .po-doc-body{padding:24px 26px;}
  .po-parties{display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;}
  .po-parties .box{background:var(--cream); border-radius:8px; padding:14px 16px;}
  .po-parties .box .t{font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--slate); font-weight:700; margin-bottom:6px;}
  .po-parties .box .n{font-weight:700; font-size:14px; color:var(--ink);}
  .po-parties .box .d{font-size:12.5px; color:var(--slate); margin-top:2px; line-height:1.5;}

  .action-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:18px;}
  .timeline{margin-top:6px;}
  .timeline .t-item{display:flex; gap:12px; padding:8px 0; font-size:12.5px;}
  .timeline .dot{width:8px; height:8px; border-radius:50%; background:var(--gold); margin-top:5px; flex-shrink:0;}
  .timeline .t-status{font-weight:700; color:var(--forest); text-transform:capitalize;}
  .timeline .t-meta{color:var(--slate-light);}

  .tabs{display:flex; gap:4px; border-bottom:1.5px solid var(--line); margin-bottom:18px;}
  .tab{padding:9px 4px; margin-right:20px; font-size:13.5px; font-weight:600; color:var(--slate); border-bottom:2px solid transparent; background:none; border-top:none; border-left:none; border-right:none;}
  .tab.active{color:var(--forest); border-bottom-color:var(--gold);}

  .toast{
    position:fixed; bottom:24px; right:24px; background:var(--forest); color:#fff; padding:12px 18px;
    border-radius:8px; font-size:13px; box-shadow:0 10px 30px rgba(0,0,0,.25); z-index:100; display:none;
  }
  .toast.err{background:var(--red);}

  @media(max-width:820px){
    .shell{grid-template-columns:1fr;}
    .sidebar{position:relative; height:auto; flex-direction:row; overflow-x:auto;}
    .sb-nav{flex-direction:row;}
    .sb-foot{display:none;}
    .main{padding:20px;}
    .grid2, .po-parties{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<!-- ============ LOGIN VIEW ============ -->
<div id="login-view">
  <div class="login-card">
    <div class="login-brand">
      <div class="mark">S</div>
      <div class="name">Sevako VMS</div>
    </div>
    <div class="login-sub">Vendor Management &amp; Purchase Orders</div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@company.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" onclick="handleLogin()">Sign In</button>
    <div class="login-error" id="login-error"></div>
    <div class="login-foot">Sevako Solutions &nbsp;·&nbsp; Your Vision. Our Technology.</div>
  </div>
</div>

<!-- ============ APP VIEW ============ -->
<div id="app-view">
  <div class="shell">
    <div class="sidebar">
      <div class="sb-brand">
        <div class="mark">S</div>
        <div class="name">Sevako VMS</div>
      </div>
      <div class="sb-nav" id="sb-nav">
        <button data-view="dashboard" class="active"><span class="icon">◆</span> Dashboard</button>
        <button data-view="vendors"><span class="icon">▤</span> Vendors</button>
        <button data-view="pos"><span class="icon">▦</span> Purchase Orders</button>
        <button data-view="payments"><span class="icon">◈</span> Payments</button>
        <button data-view="reports"><span class="icon">▥</span> Reports</button>
        <button data-view="users" id="nav-users" style="display:none;"><span class="icon">◍</span> Users</button>
      </div>
      <div class="sb-foot">
        <div class="sb-user">
          <b id="sb-user-name">—</b>
          <span id="sb-user-email">—</span>
          <div class="sb-role" id="sb-user-role">—</div>
        </div>
        <button class="sb-logout" onclick="handleLogout()">Sign Out</button>
      </div>
    </div>

    <div class="main" id="main-content">
      <!-- rendered by JS -->
    </div>
  </div>
</div>

<div class="overlay" id="overlay"><div id="overlay-content"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   SEVAKO VMS — Config
   Replace with your Supabase project credentials.
   ============================================================ */
const SUPABASE_URL = 'YOUR_SUPABASE_PROJECT_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

let sb = null;
const CONFIG_MISSING = (!SUPABASE_URL || SUPABASE_URL === 'YOUR_SUPABASE_PROJECT_URL' || !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY === 'YOUR_SUPABASE_ANON_KEY');
if(CONFIG_MISSING){
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('login-view').innerHTML = `
      <div class="login-card">
        <div class="login-brand"><div class="mark">S</div><div class="name">Sevako VMS</div></div>
        <div class="login-sub" style="color:var(--red); font-weight:600;">Setup needed</div>
        <p style="font-size:13px; color:var(--slate); line-height:1.6;">
          This app isn't connected to a Supabase project yet. Open this file, find
          <code style="background:var(--cream); padding:1px 5px; border-radius:4px;">SUPABASE_URL</code> and
          <code style="background:var(--cream); padding:1px 5px; border-radius:4px;">SUPABASE_ANON_KEY</code>
          near the top of the &lt;script&gt; block, and replace them with your project's values from
          Supabase → Project Settings → API.
        </p>
      </div>`;
  });
} else {
  try{
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch(e){
    console.error('Supabase init failed', e);
  }
}

let currentUser = null;
let currentProfile = null;
let currentView = 'dashboard';
let vendorsCache = [];
let posCache = [];

const STATUS_LABELS = {
  draft:'Draft', pending_approval:'Pending Approval', approved:'Approved', rejected:'Rejected',
  ordered:'Ordered', partially_received:'Partially Received', received:'Received',
  closed:'Closed', cancelled:'Cancelled'
};
const ROLE_LABELS = {
  admin:'Admin', purchase_manager:'Purchase Manager', approver:'Approver', finance:'Finance', viewer:'Viewer'
};

/* ---------------- AUTH ---------------- */
async function handleLogin(){
  if(!sb){ return; }
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  if(!email || !password){ errEl.textContent='Enter email and password.'; errEl.style.display='block'; return; }
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ errEl.textContent = error.message; errEl.style.display = 'block'; return; }
  await afterLogin(data.user);
}

async function handleLogout(){
  await sb.auth.signOut();
  currentUser = null; currentProfile = null;
  document.getElementById('app-view').style.display = 'none';
  document.getElementById('login-view').style.display = 'flex';
}

async function afterLogin(user){
  currentUser = user;
  const { data: profile, error } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if(error || !profile){ showToast('Could not load profile. Contact admin.', true); return; }
  currentProfile = profile;
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('app-view').style.display = 'block';
  document.getElementById('sb-user-name').textContent = profile.full_name;
  document.getElementById('sb-user-email').textContent = profile.email;
  document.getElementById('sb-user-role').textContent = ROLE_LABELS[profile.role] || profile.role;
  if(profile.role === 'admin') document.getElementById('nav-users').style.display = 'flex';
  bindNav();
  navigate('dashboard');
}

if(sb){
  sb.auth.getSession().then(({ data }) => {
    if(data.session) afterLogin(data.session.user);
  });
}

/* ---------------- NAV ---------------- */
function bindNav(){
  document.querySelectorAll('#sb-nav button').forEach(btn=>{
    btn.onclick = () => navigate(btn.dataset.view);
  });
}
function navigate(view){
  currentView = view;
  document.querySelectorAll('#sb-nav button').forEach(b=>b.classList.toggle('active', b.dataset.view===view));
  const map = { dashboard:renderDashboard, vendors:renderVendors, pos:renderPOs, payments:renderPayments, reports:renderReports, users:renderUsers };
  (map[view] || renderDashboard)();
}

/* ---------------- HELPERS ---------------- */
function showToast(msg, isErr){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast' + (isErr ? ' err' : '');
  t.style.display = 'block';
  setTimeout(()=> t.style.display='none', 3200);
}
function fmt(n){ return '₹' + Number(n||0).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtDate(d){ if(!d) return '—'; return new Date(d).toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'}); }
function openModal(html, wide){
  document.getElementById('overlay-content').innerHTML = `<div class="modal ${wide?'wide':''}">${html}</div>`;
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
function canManageVendors(){ return ['admin','purchase_manager'].includes(currentProfile.role); }
function canCreatePO(){ return ['admin','purchase_manager'].includes(currentProfile.role); }
function canApprove(){ return ['admin','approver'].includes(currentProfile.role); }
function canPay(){ return ['admin','finance'].includes(currentProfile.role); }
function canAdmin(){ return currentProfile.role === 'admin'; }

/* ============================================================
   ATTACHMENTS (shared by Vendors & Purchase Orders)
   ============================================================ */
async function attachmentsHtml(entityType, entityId, canUpload){
  const { data, error } = await sb.from('attachments').select('*, profiles(full_name)').eq('entity_type', entityType).eq('entity_id', entityId).order('created_at', {ascending:false});
  if(error){ return `<div class="empty">Could not load attachments.</div>`; }
  const rows = (data||[]).map(a=>`
    <div style="display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--line); font-size:13px;">
      <div style="display:flex; align-items:center; gap:8px; min-width:0;">
        <span>📎</span>
        <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:280px;">${a.file_name}</span>
        <span style="color:var(--slate-light); font-size:11px;">${a.file_size ? Math.round(a.file_size/1024)+' KB' : ''}</span>
      </div>
      <div style="display:flex; gap:10px; flex-shrink:0;">
        <button class="btn-ghost" onclick="downloadAttachment('${a.file_path}','${a.file_name.replace(/'/g,"\\'")}')">Download</button>
        ${canUpload ? `<button class="btn-ghost" style="color:var(--red);" onclick="deleteAttachment('${a.id}','${a.file_path}','${entityType}','${entityId}')">Remove</button>` : ''}
      </div>
    </div>`).join('');
  return `
    <div id="attach-list">${rows || '<div style="font-size:12.5px; color:var(--slate-light); padding:6px 0;">No files attached yet.</div>'}</div>
    ${canUpload ? `
      <div style="margin-top:10px;">
        <input type="file" id="attach-input-${entityType}-${entityId}" style="display:none;" onchange="uploadAttachment('${entityType}','${entityId}', this)">
        <button class="btn btn-ghost" style="border:1.5px dashed var(--line); padding:8px 14px;" onclick="document.getElementById('attach-input-${entityType}-${entityId}').click()">+ Attach File</button>
      </div>` : ''}
  `;
}

async function uploadAttachment(entityType, entityId, inputEl){
  const file = inputEl.files[0];
  if(!file) return;
  if(file.size > 15 * 1024 * 1024){ showToast('File too large (max 15MB)', true); return; }
  const path = `${entityType}/${entityId}/${Date.now()}_${file.name}`;
  const { error: upErr } = await sb.storage.from('vms-attachments').upload(path, file);
  if(upErr){ showToast(upErr.message, true); return; }
  const { error: insErr } = await sb.from('attachments').insert({
    entity_type: entityType, entity_id: entityId, file_name: file.name, file_path: path,
    file_size: file.size, mime_type: file.type, uploaded_by: currentUser.id
  });
  if(insErr){ showToast(insErr.message, true); return; }
  showToast('File attached');
  document.getElementById('attach-list').outerHTML = (await attachmentsHtml(entityType, entityId, true));
}

async function downloadAttachment(path, name){
  const { data, error } = await sb.storage.from('vms-attachments').createSignedUrl(path, 60);
  if(error){ showToast(error.message, true); return; }
  const a = document.createElement('a');
  a.href = data.signedUrl; a.download = name; a.target = '_blank';
  document.body.appendChild(a); a.click(); a.remove();
}

async function deleteAttachment(id, path, entityType, entityId){
  if(!confirm('Remove this attachment?')) return;
  await sb.storage.from('vms-attachments').remove([path]);
  const { error } = await sb.from('attachments').delete().eq('id', id);
  if(error){ showToast(error.message, true); return; }
  showToast('Attachment removed');
  document.getElementById('attach-list').outerHTML = (await attachmentsHtml(entityType, entityId, true));
}

async function saveVendor(id){
  const payload = {
    name: document.getElementById('f-name').value.trim(),
    category: document.getElementById('f-category').value.trim(),
    contact_person: document.getElementById('f-contact').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    payment_terms: document.getElementById('f-terms').value.trim(),
    gst_number: document.getElementById('f-gst').value.trim(),
    pan_number: document.getElementById('f-pan').value.trim(),
    address: document.getElementById('f-address').value.trim(),
    city: document.getElementById('f-city').value.trim(),
    state: document.getElementById('f-state').value.trim(),
    bank_account_name: document.getElementById('f-bname').value.trim(),
    bank_account_number: document.getElementById('f-bnum').value.trim(),
    bank_ifsc: document.getElementById('f-ifsc').value.trim(),
    status: document.getElementById('f-status').value,
    notes: document.getElementById('f-notes').value.trim(),
  };
  if(!payload.name){ showToast('Vendor name is required', true); return; }
  let error;
  if(id){
    ({ error } = await sb.from('vendors').update(payload).eq('id', id));
  } else {
    payload.vendor_code = 'V' + Date.now().toString().slice(-8);
    payload.created_by = currentUser.id;
    ({ error } = await sb.from('vendors').insert(payload));
  }
  if(error){ showToast(error.message, true); return; }
  closeModal(); showToast(id?'Vendor updated':'Vendor created');
  renderVendors();
}

function addPOItemRow(){
  poItemCounter++;
  const id = 'row' + poItemCounter;
  const tbody = document.getElementById('po-items-body');
  const tr = document.createElement('tr');
  tr.id = id;
  tr.innerHTML = `
    <td><input class="pi-name" placeholder="Item name"></td>
    <td><input class="pi-qty" type="number" value="1" min="0" step="0.01" oninput="recalcPO()"></td>
    <td><input class="pi-unit" value="pcs"></td>
    <td><input class="pi-price" type="number" value="0" min="0" step="0.01" oninput="recalcPO()"></td>
    <td><input class="pi-tax" type="number" value="18" min="0" step="0.01" oninput="recalcPO()"></td>
    <td class="mono pi-linetotal">₹0.00</td>
    <td><button class="btn-ghost" onclick="document.getElementById('${id}').remove(); recalcPO();">✕</button></td>
  `;
  tbody.appendChild(tr);
}

function recalcPO(){
  let subtotal = 0, tax = 0;
  document.querySelectorAll('#po-items-body tr').forEach(tr=>{
    const qty = parseFloat(tr.querySelector('.pi-qty').value) || 0;
    const price = parseFloat(tr.querySelector('.pi-price').value) || 0;
    const taxPct = parseFloat(tr.querySelector('.pi-tax').value) || 0;
    const lineBase = qty * price;
    const lineTax = lineBase * (taxPct/100);
    subtotal += lineBase; tax += lineTax;
    tr.querySelector('.pi-linetotal').textContent = fmt(lineBase + lineTax);
  });
  document.getElementById('po-subtotal').textContent = fmt(subtotal);
  document.getElementById('po-tax').textContent = fmt(tax);
  document.getElementById('po-grand').textContent = fmt(subtotal + tax);
}

async function savePO(status){
  const vendorId = document.getElementById('po-vendor').value;
  if(!vendorId){ showToast('Please select a vendor', true); return; }
  const rows = [...document.querySelectorAll('#po-items-body tr')].map(tr=>{
    const qty = parseFloat(tr.querySelector('.pi-qty').value)||0;
    const price = parseFloat(tr.querySelector('.pi-price').value)||0;
    const taxPct = parseFloat(tr.querySelector('.pi-tax').value)||0;
    const lineBase = qty*price;
    return {
      item_name: tr.querySelector('.pi-name').value.trim(),
      quantity: qty, unit: tr.querySelector('.pi-unit').value.trim()||'pcs',
      unit_price: price, tax_percent: taxPct,
      line_total: lineBase + lineBase*(taxPct/100)
    };
  }).filter(r=>r.item_name);
  if(!rows.length){ showToast('Add at least one line item', true); return; }

  const subtotal = rows.reduce((s,r)=>s + r.quantity*r.unit_price, 0);
  const taxAmount = rows.reduce((s,r)=>s + (r.quantity*r.unit_price)*(r.tax_percent/100), 0);

  const { data: po, error } = await sb.from('purchase_orders').insert({
    vendor_id: vendorId,
    status,
    order_date: document.getElementById('po-date').value,
    expected_delivery_date: document.getElementById('po-expected').value || null,
    delivery_address: document.getElementById('po-delivery-addr').value.trim(),
    subtotal, tax_amount: taxAmount, grand_total: subtotal+taxAmount,
    notes: document.getElementById('po-notes').value.trim(),
    created_by: currentUser.id
  }).select().single();

  if(error){ showToast(error.message, true); return; }

  const itemsPayload = rows.map((r,i)=>({...r, po_id: po.id, sort_order:i}));
  const { error: itemErr } = await sb.from('po_items').insert(itemsPayload);
  if(itemErr){ showToast(itemErr.message, true); return; }

  closeModal(); showToast('Purchase order ' + (status==='draft'?'saved as draft':'submitted for approval'));
  renderPOs();
}

async function openPODetail(id){
  const { data: po, error } = await sb.from('purchase_orders').select('*, vendors(*)').eq('id', id).single();
  if(error){ showToast(error.message, true); return; }
  const { data: items } = await sb.from('po_items').select('*').eq('po_id', id).order('sort_order');
  const { data: history } = await sb.from('po_status_history').select('*, profiles(full_name)').eq('po_id', id).order('changed_at', {ascending:false});
  const { data: pays } = await sb.from('payments').select('*').eq('po_id', id).order('payment_date', {ascending:false});
  const paid = (pays||[]).reduce((s,p)=>s+Number(p.amount),0);

  const stampable = ['approved','rejected','pending_approval'].includes(po.status);

  openModal(`
    <div class="modal-head"><h3>${po.po_number}</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="po-doc">
        <div class="po-doc-head">
          <div>
            <div class="po-num">${po.po_number}</div>
            <div class="po-meta">Ordered ${fmtDate(po.order_date)} · Expected ${fmtDate(po.expected_delivery_date)}</div>
          </div>
          ${stampable ? `<div class="stamp ${po.status}">${STATUS_LABELS[po.status]}</div>` : `<span class="badge badge-${po.status}">${STATUS_LABELS[po.status]}</span>`}
        </div>
        <div class="po-doc-body">
          <div class="po-parties">
            <div class="box"><div class="t">Vendor</div><div class="n">${po.vendors.name}</div><div class="d">${po.vendors.contact_person||''}<br>${po.vendors.phone||''} ${po.vendors.email?('· '+po.vendors.email):''}<br>${po.vendors.gst_number?('GST: '+po.vendors.gst_number):''}</div></div>
            <div class="box"><div class="t">Deliver To</div><div class="n">${po.delivery_address || '—'}</div></div>
          </div>
          <table><thead><tr><th>Item</th><th class="num">Qty</th><th class="num">Unit Price</th><th class="num">Tax</th><th class="num">Total</th></tr></thead>
            <tbody>${(items||[]).map(i=>`<tr><td>${i.item_name}</td><td class="num">${i.quantity} ${i.unit}</td><td class="num amt">${fmt(i.unit_price)}</td><td class="num">${i.tax_percent}%</td><td class="num amt">${fmt(i.line_total)}</td></tr>`).join('')}</tbody></table>
          <div class="totals-box">
            <div class="r"><span>Subtotal</span><span class="mono">${fmt(po.subtotal)}</span></div>
            <div class="r"><span>Tax</span><span class="mono">${fmt(po.tax_amount)}</span></div>
            <div class="r grand"><span>Grand Total</span><span class="mono">${fmt(po.grand_total)}</span></div>
            <div class="r" style="color:var(--green);"><span>Paid</span><span class="mono">${fmt(paid)}</span></div>
            <div class="r" style="color:var(--red);"><span>Outstanding</span><span class="mono">${fmt(po.grand_total-paid)}</span></div>
          </div>
          ${po.notes ? `<div style="margin-top:14px; font-size:13px; color:var(--slate);"><b>Notes:</b> ${po.notes}</div>` : ''}
          ${po.rejection_reason ? `<div style="margin-top:10px; font-size:13px; color:var(--red);"><b>Rejection reason:</b> ${po.rejection_reason}</div>` : ''}
        </div>
      </div>

      <div class="action-row">
        ${po.status==='pending_approval' && canApprove() ? `
          <button class="btn btn-gold" onclick="setPOStatus('${po.id}','approved')">Approve</button>
          <button class="btn btn-danger" onclick="rejectPO('${po.id}')">Reject</button>` : ''}
        ${po.status==='approved' && (canCreatePO()||canApprove()) ? `<button class="btn btn-gold" onclick="setPOStatus('${po.id}','ordered')">Mark as Ordered</button>` : ''}
        ${['ordered','partially_received'].includes(po.status) && (canCreatePO()||canApprove()) ? `<button class="btn btn-gold" onclick="setPOStatus('${po.id}','received')">Mark as Received</button>` : ''}
        ${po.status==='received' && canAdmin() ? `<button class="btn" onclick="setPOStatus('${po.id}','closed')">Close PO</button>` : ''}
        ${!['closed','cancelled','received'].includes(po.status) && (canAdmin()) ? `<button class="btn btn-danger" onclick="setPOStatus('${po.id}','cancelled')">Cancel PO</button>` : ''}
        ${canPay() && !['draft','cancelled','rejected'].includes(po.status) ? `<button class="btn" onclick="closeModal(); openPaymentForm('${po.vendor_id}','${po.id}')">Record Payment</button>` : ''}
      </div>

      <h3 style="font-size:13px; margin:18px 0 8px; color:var(--forest);">Attachments</h3>
      <div id="po-attachments-wrap"><div class="empty" style="padding:10px 0;">Loading…</div></div>

      <h3 style="font-size:13px; margin:18px 0 4px; color:var(--forest);">Status History</h3>
      <div class="timeline">${(history||[]).map(h=>`
        <div class="t-item"><div class="dot"></div><div><div class="t-status">${STATUS_LABELS[h.status]||h.status}</div><div class="t-meta">${fmtDate(h.changed_at)} · ${h.profiles?.full_name||'System'}${h.notes?(' · '+h.notes):''}</div></div></div>
      `).join('')}</div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="printPO('${po.id}')">🖨 Print / PDF</button>
      <button class="btn" onclick="closeModal()">Close</button>
    </div>
  `, true);
  document.getElementById('po-attachments-wrap').innerHTML = await attachmentsHtml('po', po.id, canCreatePO() || canAdmin() || canPay());
}

async function setPOStatus(id, status){
  const { error } = await sb.from('purchase_orders').update({
    status, approved_by: status==='approved'?currentUser.id:undefined, approved_at: status==='approved'?new Date().toISOString():undefined
  }).eq('id', id);
  if(error){ showToast(error.message, true); return; }
  showToast('Status updated to ' + STATUS_LABELS[status]);
  closeModal(); renderPOs();
}
async function rejectPO(id){
  const reason = prompt('Reason for rejection:');
  if(reason===null) return;
  const { error } = await sb.from('purchase_orders').update({ status:'rejected', rejection_reason: reason }).eq('id', id);
  if(error){ showToast(error.message, true); return; }
  showToast('PO rejected'); closeModal(); renderPOs();
}

/* ============================================================
   PAYMENTS
   ============================================================ */
async function renderPayments(){
  const main = document.getElementById('main-content');
  main.innerHTML = `<div class="topbar"><div><h1>Payments</h1><div class="sub">Track vendor payments against purchase orders</div></div>
    ${canPay() ? `<button class="btn btn-gold" onclick="openPaymentForm()">+ Record Payment</button>` : ''}</div>
    <div class="panel" style="padding:0;"><div id="payments-table"><div class="empty">Loading…</div></div></div>`;

  const { data, error } = await sb.from('payments').select('*, vendors(name), purchase_orders(po_number)').order('payment_date', {ascending:false});
  if(error){ showToast(error.message, true); return; }
  document.getElementById('payments-table').innerHTML = (data&&data.length) ? `
    <table><thead><tr><th>Payment #</th><th>Vendor</th><th>PO</th><th>Date</th><th>Mode</th><th>Status</th><th class="num">Amount</th></tr></thead>
    <tbody>${data.map(p=>`
      <tr><td class="mono">${p.payment_number}</td><td>${p.vendors?.name||'—'}</td><td class="mono">${p.purchase_orders?.po_number||'—'}</td>
        <td>${fmtDate(p.payment_date)}</td><td style="text-transform:capitalize;">${p.payment_mode.replace('_',' ')}</td>
        <td><span class="badge badge-${p.status==='completed'?'approved':p.status==='failed'?'rejected':'pending_approval'}">${p.status}</span></td>
        <td class="num amt">${fmt(p.amount)}</td></tr>`).join('')}</tbody></table>
  ` : `<div class="empty"><div class="big">💳</div>No payments recorded yet.</div>`;
}

function openPaymentForm(vendorId, poId){
  openModal(`
    <div class="modal-head"><h3>Record Payment</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="field-sm"><label>Vendor *</label>
        <select id="pay-vendor" onchange="loadVendorPOsForPayment()">
          <option value="">Select vendor…</option>
          ${vendorsCache.map(v=>`<option value="${v.id}" ${vendorId===v.id?'selected':''}>${v.name}</option>`).join('')}
        </select>
      </div>
      <div class="field-sm"><label>Purchase Order (optional)</label>
        <select id="pay-po"><option value="">— General payment —</option></select>
      </div>
      <div class="grid2">
        <div class="field-sm"><label>Amount *</label><input type="number" id="pay-amount" min="0" step="0.01"></div>
        <div class="field-sm"><label>Payment Date</label><input type="date" id="pay-date" value="${new Date().toISOString().slice(0,10)}"></div>
      </div>
      <div class="grid2">
        <div class="field-sm"><label>Mode</label>
          <select id="pay-mode">
            <option value="bank_transfer">Bank Transfer</option><option value="upi">UPI</option>
            <option value="cheque">Cheque</option><option value="cash">Cash</option>
            <option value="card">Card</option><option value="other">Other</option>
          </select>
        </div>
        <div class="field-sm"><label>Reference Number</label><input id="pay-ref" placeholder="UTR / cheque no."></div>
      </div>
      <div class="field-sm"><label>Notes</label><textarea id="pay-notes" rows="2"></textarea></div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-gold" onclick="savePayment()">Save Payment</button></div>
  `);
  if(vendorId) loadVendorPOsForPayment(poId);
}

async function loadVendorPOsForPayment(preselectPoId){
  const vendorId = document.getElementById('pay-vendor').value;
  const sel = document.getElementById('pay-po');
  sel.innerHTML = `<option value="">— General payment —</option>`;
  if(!vendorId) return;
  const { data } = await sb.from('purchase_orders').select('id, po_number, grand_total').eq('vendor_id', vendorId).not('status','in','("draft","cancelled","rejected")');
  (data||[]).forEach(p=>{
    const opt = document.createElement('option');
    opt.value = p.id; opt.textContent = `${p.po_number} · ${fmt(p.grand_total)}`;
    if(preselectPoId===p.id) opt.selected = true;
    sel.appendChild(opt);
  });
}

async function savePayment(){
  const vendorId = document.getElementById('pay-vendor').value;
  const amount = parseFloat(document.getElementById('pay-amount').value);
  if(!vendorId || !amount){ showToast('Vendor and amount are required', true); return; }
  const { error } = await sb.from('payments').insert({
    vendor_id: vendorId,
    po_id: document.getElementById('pay-po').value || null,
    amount,
    payment_date: document.getElementById('pay-date').value,
    payment_mode: document.getElementById('pay-mode').value,
    reference_number: document.getElementById('pay-ref').value.trim(),
    notes: document.getElementById('pay-notes').value.trim(),
    created_by: currentUser.id
  });
  if(error){ showToast(error.message, true); return; }
  closeModal(); showToast('Payment recorded'); renderPayments();
}

/* ============================================================
   REPORTS
   ============================================================ */
async function renderReports(){
  const main = document.getElementById('main-content');
  main.innerHTML = `<div class="topbar"><div><h1>Reports</h1><div class="sub">Spend summary by vendor and category</div></div></div>
    <div class="panel"><div class="panel-head"><h3>Spend by Vendor</h3></div><div id="rep-vendor"><div class="empty">Loading…</div></div></div>
    <div class="panel"><div class="panel-head"><h3>Spend by Category</h3></div><div id="rep-category"><div class="empty">Loading…</div></div></div>`;

  const { data: pos } = await sb.from('purchase_orders').select('grand_total, vendor_id, vendors(name, category)').not('status','in','("draft","cancelled","rejected")');

  const byVendor = {};
  const byCategory = {};
  (pos||[]).forEach(p=>{
    const vname = p.vendors?.name || 'Unknown';
    const cat = p.vendors?.category || 'Uncategorized';
    byVendor[vname] = (byVendor[vname]||0) + Number(p.grand_total);
    byCategory[cat] = (byCategory[cat]||0) + Number(p.grand_total);
  });
  const maxV = Math.max(1, ...Object.values(byVendor));
  const maxC = Math.max(1, ...Object.values(byCategory));

  function bars(obj, max){
    const entries = Object.entries(obj).sort((a,b)=>b[1]-a[1]);
    if(!entries.length) return `<div class="empty">No data yet.</div>`;
    return entries.map(([k,v])=>`
      <div style="margin-bottom:12px;">
        <div style="display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:4px;"><span>${k}</span><span class="mono">${fmt(v)}</span></div>
        <div style="background:var(--gray-bg); border-radius:6px; height:8px; overflow:hidden;"><div style="background:var(--gold); width:${(v/max*100)}%; height:100%;"></div></div>
      </div>`).join('');
  }
  document.getElementById('rep-vendor').innerHTML = bars(byVendor, maxV);
  document.getElementById('rep-category').innerHTML = bars(byCategory, maxC);
}

/* ============================================================
   USERS (admin only)
   ============================================================ */
async function renderUsers(){
  const main = document.getElementById('main-content');
  main.innerHTML = `<div class="topbar"><div><h1>Users</h1><div class="sub">Manage roles and access</div></div></div>
    <div class="panel" style="padding:0;"><div id="users-table"><div class="empty">Loading…</div></div></div>`;
  const { data, error } = await sb.from('profiles').select('*').order('full_name');
  if(error){ showToast(error.message, true); return; }
  document.getElementById('users-table').innerHTML = (data&&data.length) ? `
    <table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th></tr></thead>
    <tbody>${data.map(u=>`
      <tr><td><b>${u.full_name}</b></td><td>${u.email}</td>
        <td><select onchange="updateUserRole('${u.id}', this.value)" style="padding:6px 8px; border:1.5px solid var(--line); border-radius:6px;">
          ${Object.entries(ROLE_LABELS).map(([k,l])=>`<option value="${k}" ${u.role===k?'selected':''}>${l}</option>`).join('')}
        </select></td>
        <td><span class="badge badge-${u.is_active?'active':'inactive'}">${u.is_active?'Active':'Inactive'}</span></td>
      </tr>`).join('')}</tbody></table>
  ` : `<div class="empty">No users found.</div>`;
}
async function updateUserRole(id, role){
  const { error } = await sb.from('profiles').update({ role }).eq('id', id);
  if(error){ showToast(error.message, true); return; }
  showToast('Role updated');
}

/* close modal on overlay click */
document.getElementById('overlay').addEventListener('click', (e)=>{ if(e.target.id==='overlay') closeModal(); });
